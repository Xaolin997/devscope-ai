services:
  postgres:
    image: postgres:16
    container_name: devscope-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devscope
    ports:
      - "5432:5432"
    volumes:
      - devscope_postgres_data:/var/lib/postgresql/data

  postgres-test:
    image: postgres:16
    container_name: devscope-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devscope_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  devscope_postgres_data:
    external: true
    name: devscope-ai_devscope_postgres_data